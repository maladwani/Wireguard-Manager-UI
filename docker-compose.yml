services:
  wireguard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wireguard-manager
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      - DATABASE_URL=file:/data/app.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3123}
      - WG_CONFIG_PATH=/etc/wireguard/wg0.conf
      - WG_SERVER_HOST=${WG_SERVER_HOST:-auto}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-encryption-key-32char}
    volumes:
      - /etc/wireguard:/etc/wireguard
      - ui-data:/data
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "3123:3000"
    restart: unless-stopped

volumes:
  ui-data:

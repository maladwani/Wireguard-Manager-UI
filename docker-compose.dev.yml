services:
  wireguard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: wireguard-manager-dev
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      - DATABASE_URL=file:/data/app.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-key-change-me}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3123}
      - WG_CONFIG_PATH=/etc/wireguard/wg0.conf
      - WG_SERVER_HOST=${WG_SERVER_HOST:-auto}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-encryption-key-32char}
      - WATCHPACK_POLLING=true
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - /etc/wireguard:/etc/wireguard
      - ui-data-dev:/data
      - /lib/modules:/lib/modules:ro
      - /app/node_modules
      - /app/.next
    ports:
      - "51820:51820/udp"
      - "3123:3000"
    restart: unless-stopped

volumes:
  ui-data-dev:
